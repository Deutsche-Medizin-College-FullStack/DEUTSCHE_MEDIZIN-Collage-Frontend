<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/companylogo.jpg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deutsche Hochschule für Medizin College</title>
    <script>
      window.onerror = function (message, source, lineno, colno, error) {
        document.documentElement.innerHTML = 
          '<div style="color:red; font-size: 16px; white-space: pre-wrap; padding: 20px;">' + 
          'Error: ' + message + '\n' +
          'Source: ' + source + ':' + lineno + ':' + colno + '\n' +
          'Stack: ' + (error && error.stack ? error.stack : 'no stack') + 
          '</div>';
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
